name: ESP32-S3 Automated OTA Build & Deploy

# 1. تحديد متى يشتغل السكريبت (عند عمل Push أو Merge على فرع main)
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    # 2. السطر السحري: نخبر جيتهاب أن يشغل البناء على السيرفر الخاص بك الذي يحمل هذا الوسم
    runs-on: [self-hosted, linux, arm64]

    steps:
      # الخطوة الأولى: سحب الكود الجديد من المستودع إلى داخل السيرفر
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required: fetch all tags for git describe

      # الخطوة الثانية: تشغيل البناء باستخدام بيئة ESP-IDF المثبتة عبر Ansible
      - name: Compile ESP32-S3 Firmware
        run: |
          # تفعيل متغيرات البيئة للـ Compiler الخاص بـ Espressif
          . /home/ubuntu/.espressif/v5.4.2/esp-idf/export.sh
          
          # تنظيف أي بقايا بناء سابقة للتأكد من سلامة النظام
          idf.py fullclean
          
          # بناء السوفتوير الجديد لمعالج ESP32-S3
          idf.py build

      # الخطوة الثالثة: تشغيل سكريبت النشر لرفع الملفات إلى AWS S3
      - name: Run Deploy Script (Upload to S3)
        run: |
          # إعطاء صلاحية تنفيذية للسكريبت في حال نسيانها
          chmod +x ./scripts/after_build.sh
          
          # تشغيل السكريبت لرفع الملفات (firmware.bin و version.txt) إلى S3
          ./scripts/after_build.sh